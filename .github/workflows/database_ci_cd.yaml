name: Database Overall Review

on:
  workflow_dispatch:
    inputs:
      migrations_path:
        description: 'Diretório das migrações para teste manual'
        required: false
        default: 'back-end/migrations'
        type: string
  pull_request:
    branches: [ dev, main ]
    paths:
      - "back-end/migrations/**"
  push:
    branches: [ dev, main ]
    paths: 
      - "back-end/migrations/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

env:
  DEFAULT_MIGRATIONS_PATH: "back-end/migrations"
  PYTHON_VERSION: "3.11"
  PG_VERSION: "17"
  FLYWAY_VERSION: "10.15.0"

jobs:
  sql-linting:
    name: Running SQLFluff (syntax check)
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install SQLFluff
        run: pip install sqlfluff

      - name: Run SQLFluff Lint
        run: sqlfluff lint ${{ github.event.inputs.migrations_path || env.DEFAULT_MIGRATIONS_PATH }} --dialect postgres

  migration-test:
    name: Dry-Run Migrations (Supabase Local)
    runs-on: ubuntu-22.04
    needs: [sql-linting]

    env:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin_password_ephemeral
      POSTGRES_DB: app_test_db

    steps:
      - name: Checkout do código
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Instalar Supabase CLI
        run: npm install -g supabase

      - name: Instalar Flyway CLI
        run: |
          wget -qO- https://repo1.maven.org/maven2/org/flywaydb/flyway-commandline/${{ env.FLYWAY_VERSION }}/flyway-commandline-${{ env.FLYWAY_VERSION }}-linux-x64.tar.gz \
            | tar -xz

          sudo ln -s \
            $(pwd)/flyway-${{ env.FLYWAY_VERSION }}/flyway \
            /usr/local/bin/flyway

      - name: Iniciar ambiente Supabase
        run: supabase start

      # VALORES HARDCODED:
      # Esse serviço é efemero e será destruido após seu uso.
      # Portanto, não há perigo em manter essas credenciais
      # simples expostas. Jamais use as do banco de verdade.
      - name: Aplicar migrations com Flyway
        env:
          FLYWAY_URL: "postgresql://postgres:postgres@127.0.0.1:54322/postgres"
          FLYWAY_USER: postgres
          FLYWAY_PASS: postgres
          MIGRATIONS_DIR: ${{ github.event.inputs.migrations_path || env.DEFAULT_MIGRATIONS_PATH }}
        run: |
          flyway \
            -url=" $${{ env.FLYWAY_URL }} " \
            -user=" $${{ env.FLYWAY_USER }} " \
            -password=" $${{ env.FLYWAY_PASS }} " \
            -locations="filesystem:$MIGRATIONS_DIR" \
            -baselineOnMigrate=true \
            migrate

      - name: Validar estado do banco
        run: |
          supabase db lint || true

      - name: Encerrar ambiente Supabase
        if: always()
        run: supabase stop

      - name: Sucesso
        run: echo "🎉 Todas as migrations foram aplicadas com sucesso em um ambiente Supabase."
    
  deploy-migrations-dev:
    name: Deploy to Supabase via Flyway - Dev
    runs-on: ubuntu-22.04
    needs: [migration-test] 
    environment: Dev

    if: |
      github.ref == 'refs/heads/dev' &&
      (github.event_name == 'workflow_dispatch' || github.event_name == 'push')  

    steps:
      - name: Checkout do código
        uses: actions/checkout@v5.0.1

      - name: Instalar Flyway CLI
        run: |
          echo "Baixando e instalando o Flyway versão ${{ env.FLYWAY_VERSION }}..."
          wget -qO- https://repo1.maven.org/maven2/org/flywaydb/flyway-commandline/${{ env.FLYWAY_VERSION }}/flyway-commandline-${{ env.FLYWAY_VERSION }}-linux-x64.tar.gz | tar -xvz
          sudo ln -s $(pwd)/flyway-${{ env.FLYWAY_VERSION }}/flyway /usr/local/bin/flyway

      - name: Executar Deploy no Supabase
        env:
          MIGRATIONS_DIR: ${{ github.event.inputs.migrations_path || env.DEFAULT_MIGRATIONS_PATH }}
        run: |
          echo "Iniciando a migração em produção..."
          flyway \
            -url="${{ secrets.SPBS_DB_URL_DEV }}" \
            -user="${{ secrets.SPBS_DB_USER_DEV }}" \
            -password="${{ secrets.SPBS_DB_PASS_DEV }}" \
            -locations="filesystem:$MIGRATIONS_DIR" \
            -baselineOnMigrate="true" \
            migrate
  
  deploy-migrations-prod:
    name: Deploy to Supabase via Flyway - Prod
    runs-on: ubuntu-22.04
    needs: [migration-test] 
    environment: Production

    if: |
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'workflow_dispatch' || github.event_name == 'push')

    steps:
      - name: Checkout do código
        uses: actions/checkout@v5.0.1

      - name: Instalar Flyway CLI
        run: |
          echo "Baixando e instalando o Flyway versão ${{ env.FLYWAY_VERSION }}..."
          wget -qO- https://repo1.maven.org/maven2/org/flywaydb/flyway-commandline/${{ env.FLYWAY_VERSION }}/flyway-commandline-${{ env.FLYWAY_VERSION }}-linux-x64.tar.gz | tar -xvz
          sudo ln -s $(pwd)/flyway-${{ env.FLYWAY_VERSION }}/flyway /usr/local/bin/flyway

      - name: Executar Deploy no Supabase
        env:
          MIGRATIONS_DIR: ${{ github.event.inputs.migrations_path || env.DEFAULT_MIGRATIONS_PATH }}
        run: |
          echo "Iniciando a migração em produção..."
          flyway \
            -url="${{ secrets.SPBS_DB_URL_PROD }}" \
            -user="${{ secrets.SPBS_DB_USER_PROD }}" \
            -password="${{ secrets.SPBS_DB_PASS_PROD }}" \
            -locations="filesystem:$MIGRATIONS_DIR" \
            -baselineOnMigrate="true" \
            migrate
