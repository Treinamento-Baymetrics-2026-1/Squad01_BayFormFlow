name: Database Overall Review

on:
  workflow_dispatch:
    inputs:
      migrations_path:
        description: 'Diretório das migrações para teste manual'
        required: false
        default: 'back-end/migrations'
        type: string
  pull_request:
    branches: [ dev, main ]
    paths:
      - "back-end/migrations/**"
  push:
    branches: [ dev, main ]
    paths: 
      - "back-end/migrations/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

env:
  DEFAULT_MIGRATIONS_PATH: "back-end/migrations"
  PYTHON_VERSION: "3.11"
  PG_VERSION: "17"
  FLYWAY_VERSION: "10.15.0"

jobs:
  sql-linting:
    name: Running SQLFluff (syntax check)
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install SQLFluff
        run: pip install sqlfluff

      - name: Run SQLFluff Lint
        run: sqlfluff lint ${{ github.event.inputs.migrations_path || env.DEFAULT_MIGRATIONS_PATH }} --dialect postgres

  migration-test:
    name: Dry-Run Migrations (Supabase Local)
    runs-on: ubuntu-22.04
    needs: [sql-linting]

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Instalar Supabase CLI
        run: npm install -g supabase

      - name: Instalar Flyway CLI
        run: |
          echo "Baixando Flyway ${{ env.FLYWAY_VERSION }}..."
          wget -qO- \
            https://repo1.maven.org/maven2/org/flywaydb/flyway-commandline/${{ env.FLYWAY_VERSION }}/flyway-commandline-${{ env.FLYWAY_VERSION }}-linux-x64.tar.gz \
            | tar -xz

          chmod +x flyway-${{ env.FLYWAY_VERSION }}/flyway

      - name: Iniciar ambiente Supabase
        run: |
          supabase start

      - name: Descobrir URL do banco
        shell: bash
        run: |
          set -e

          STATUS=$(supabase status)

          echo "========== Supabase Status =========="
          echo "$STATUS"
          echo "====================================="

          DB_URL=$(echo "$STATUS" \
            | grep "DB URL" \
            | sed -E 's/.*postgresql:\/\//postgresql:\/\//')

          if [ -z "$DB_URL" ]; then
            echo "❌ Não foi possível localizar a DB URL."
            exit 1
          fi

          SAFE_URL=$(echo "$DB_URL" \
            | sed -E 's#(postgresql://[^:]+):[^@]+@#\1:********@#')

          echo "Banco Supabase:"
          echo "$SAFE_URL"

          FLYWAY_URL=$(echo "$DB_URL" \
            | sed 's#^postgresql://#jdbc:postgresql://#')

          echo "FLYWAY_URL=$FLYWAY_URL" >> "$GITHUB_ENV"

      - name: Aplicar migrations com Flyway
        env:
          MIGRATIONS_DIR: ${{ github.event.inputs.migrations_path || env.DEFAULT_MIGRATIONS_PATH }}
        run: |
          ./flyway-${{ env.FLYWAY_VERSION }}/flyway \
            -url="$FLYWAY_URL" \
            -locations="filesystem:$MIGRATIONS_DIR" \
            -baselineOnMigrate=true \
            migrate

      - name: Validar banco
        run: |
          supabase db lint || true

      - name: Encerrar ambiente Supabase
        if: always()
        run: |
          supabase stop

      - name: Sucesso
        run: |
          echo "🎉 Todas as migrations foram aplicadas com sucesso em um ambiente Supabase."
    
  deploy-migrations-dev:
    name: Deploy to Supabase via Flyway - Dev
    runs-on: ubuntu-22.04
    needs: [migration-test] 
    environment: Dev

    if: |
      github.ref == 'refs/heads/dev' &&
      (github.event_name == 'workflow_dispatch' || github.event_name == 'push')  

    steps:
      - name: Checkout do código
        uses: actions/checkout@v5.0.1

      - name: Instalar Flyway CLI
        run: |
          echo "Baixando e instalando o Flyway versão ${{ env.FLYWAY_VERSION }}..."
          wget -qO- https://repo1.maven.org/maven2/org/flywaydb/flyway-commandline/${{ env.FLYWAY_VERSION }}/flyway-commandline-${{ env.FLYWAY_VERSION }}-linux-x64.tar.gz | tar -xvz
          sudo ln -s $(pwd)/flyway-${{ env.FLYWAY_VERSION }}/flyway /usr/local/bin/flyway

      - name: Executar Deploy no Supabase
        env:
          MIGRATIONS_DIR: ${{ github.event.inputs.migrations_path || env.DEFAULT_MIGRATIONS_PATH }}
        run: |
          echo "Iniciando a migração em produção..."
          flyway \
            -url="${{ secrets.SPBS_DB_URL_DEV }}" \
            -user="${{ secrets.SPBS_DB_USER_DEV }}" \
            -password="${{ secrets.SPBS_DB_PASS_DEV }}" \
            -locations="filesystem:$MIGRATIONS_DIR" \
            -baselineOnMigrate="true" \
            migrate
  
  deploy-migrations-prod:
    name: Deploy to Supabase via Flyway - Prod
    runs-on: ubuntu-22.04
    needs: [migration-test] 
    environment: Production

    if: |
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'workflow_dispatch' || github.event_name == 'push')

    steps:
      - name: Checkout do código
        uses: actions/checkout@v5.0.1

      - name: Instalar Flyway CLI
        run: |
          echo "Baixando e instalando o Flyway versão ${{ env.FLYWAY_VERSION }}..."
          wget -qO- https://repo1.maven.org/maven2/org/flywaydb/flyway-commandline/${{ env.FLYWAY_VERSION }}/flyway-commandline-${{ env.FLYWAY_VERSION }}-linux-x64.tar.gz | tar -xvz
          sudo ln -s $(pwd)/flyway-${{ env.FLYWAY_VERSION }}/flyway /usr/local/bin/flyway

      - name: Executar Deploy no Supabase
        env:
          MIGRATIONS_DIR: ${{ github.event.inputs.migrations_path || env.DEFAULT_MIGRATIONS_PATH }}
        run: |
          echo "Iniciando a migração em produção..."
          flyway \
            -url="${{ secrets.SPBS_DB_URL_PROD }}" \
            -user="${{ secrets.SPBS_DB_USER_PROD }}" \
            -password="${{ secrets.SPBS_DB_PASS_PROD }}" \
            -locations="filesystem:$MIGRATIONS_DIR" \
            -baselineOnMigrate="true" \
            migrate
