name: Front-End CI/CD

on:
  pull_request:
    branches: [ dev, main ]
    paths:
      - "front-end/**"
  push:
    branches: [ dev, main ]
    paths:
      - "front-end/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

# ---------------------------------------------------------
# VARIÁVEIS GLOBAIS
# ---------------------------------------------------------
env:
  NODE_VERSION: '24.x'

jobs:
  validate-and-build:
    name: "Validate & Build (Lint, Type Check, Test)"
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: ./front-end

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: './front-end/package-lock.json'

      - name: Install Dependencies
        run: npm ci

      - name: Lint Code
        run: npm run lint

      - name: Type Check
        run: npm run type-check

      - name: Run Tests
        run: npm run test:ci

      - name: Verify Build
        run: npm run build
        
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: ./front-end/dist
          retention-days: 1