services:
  db:
    image: supabase/postgres:17.6.1.139
    container_name: supabase_db_local
    restart: unless-stopped
    env_file:
      - ../env/.env.local
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d

  flyway:
    image: flyway/flyway:10.21.0-alpine
    container_name: flyway_migrator
    depends_on:
      db:
        condition: service_healthy 
    env_file:
      - ../env/.env.local
    environment:
      FLYWAY_URL: ${DATABASE_URL}
      FLYWAY_USER: ${POSTGRES_USER}
      FLYWAY_PASSWORD: ${POSTGRES_PASSWORD}
      FLYWAY_BASELINE_ON_MIGRATE: "true"
      FLYWAY_CLEAN_DISABLED: "true"
    command: migrate 
    volumes:
      - ../../../back-end/migrations:/flyway/sql

  edge_functions:
    image: denoland/deno:alpine
    container_name: supabase_edge_functions
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ../env/.env.local
    environment:
      DATABASE_URL_DENO: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    ports:
      - "9000:9000"
    volumes:
      - ../../../back-end/functions:/app
    working_dir: /app
    command: run --allow-net --allow-env --allow-read --watch index.ts

volumes:
  db_data: 